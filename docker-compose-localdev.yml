services:
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx-localdev/conf.d:/etc/nginx/conf.d
      - ./nginx-localdev/nginx.conf:/etc/nginx/nginx.conf
      - ./client/dist/client/browser:/usr/share/nginx/html
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    environment:
      TZ: Europe/Berlin
    depends_on:
      - backend
    networks:
      - localcrag-network

  backend:
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    build:
      dockerfile: Dockerfile-backend-localdev
    volumes:
      - ./server/src:/app/src
    depends_on:
      - db
      - minio
    networks:
      - localcrag-network
    environment:
      SQLALCHEMY_DATABASE_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}"
      S3_PASSWORD: ${S3_PASSWORD}
      S3_USER: ${S3_USER}
      S3_ENDPOINT: http://storage:9000
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_ENDPOINT: ${S3_ACCESS_ENDPOINT}
      S3_ADDRESSING: path
      SUPERADMIN_FIRSTNAME: ${SUPERADMIN_FIRSTNAME}
      SUPERADMIN_LASTNAME: ${SUPERADMIN_LASTNAME}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SYSTEM_EMAIL: ${SYSTEM_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_TYPE: ${SMTP_TYPE}
      FRONTEND_HOST: ${FRONTEND_HOST}
    # command:
    #   - sh
    #   - "-c"
    #   - "cd /app/src && pwd 1>&2 && sleep 1s && pipenv run flask db upgrade && pipenv run python util/scripts/database_setup.py && pipenv run gunicorn -c ./gunicorn.conf.py"

  db:
    image: postgres:17.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    networks:
      - localcrag-network

  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    container_name: ${COMPOSE_PROJECT_NAME}-minio
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${S3_USER}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      MINIO_INIT_BUCKET: ${S3_BUCKET}
    command: server /data --address :9000 --console-address :9001
    networks:
      - localcrag-network
    entrypoint: | # Adopted from https://stackoverflow.com/a/78580294
      /bin/sh -c '
        isAlive() { curl -sf http://127.0.0.1:9000/minio/health/live; }
        minio $$0 "$$@" --quiet & echo $$! > /tmp/minio.pid
        while ! isAlive; do sleep 0.1; done
        mc alias set minio http://127.0.0.1:9000 $$S3_USER $$S3_PASSWORD
        mc mb minio/$$S3_BUCKET || true
        mc anonymous set public minio/$$S3_BUCKET
        kill -s INT $$(cat /tmp/minio.pid) && rm /tmp/minio.pid
        while isAlive; do sleep 0.1; done
        exec minio $$0 "$$@"
      '
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  localcrag-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      # device: /home/mofrim/c0de/webdev/000-MajorProjects/goewalddb/localcrag/bak/postgres-data
      device: /home/frido/c0de/GoewaldDB/000-LocalCragApp/bak/postgres-data
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      # device: /home/mofrim/c0de/webdev/000-MajorProjects/goewalddb/localcrag/bak/minio-data
      device: /home/frido/c0de/GoewaldDB/000-LocalCragApp/bak/minio-data
