services:
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./client/dist/client/browser:/usr/share/nginx/html
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    depends_on:
      - backend
      - minio
    networks:
      - lc-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://goewalddb.de" ]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: ${COMPOSE_PROJECT_NAME}-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - backend
    networks:
      - lc-network

  backend:
    build:
      dockerfile: Dockerfile-backend
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    volumes:
      - ./server/src:/app/src
    depends_on:
      - db
      - minio
    networks:
      - lc-network
    environment:
      SQLALCHEMY_DATABASE_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}"
      S3_PASSWORD: ${S3_PASSWORD}
      S3_USER: ${S3_USER}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_ENDPOINT: ${S3_ACCESS_ENDPOINT}
      S3_ADDRESSING: path
      SUPERADMIN_FIRSTNAME: ${SUPERADMIN_FIRSTNAME}
      SUPERADMIN_LASTNAME: ${SUPERADMIN_LASTNAME}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SYSTEM_EMAIL: ${SYSTEM_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_TYPE: ${SMTP_TYPE}
      FRONTEND_HOST: ${FRONTEND_HOST}
    # healthcheck:
    #   test: [ "CMD", "curl", "-f", "https://localhost:5000/api/health" ]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

  db:
    image: postgres:17.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    networks:
      - lc-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "$POSTGRES_USER", "-d", "$POSTGRES_DB", "-h", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    container_name: ${COMPOSE_PROJECT_NAME}-minio
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${S3_USER}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD}
      MINIO_INIT_BUCKET: ${S3_BUCKET}
    command: server /data --address :9000 --console-address :9001
    networks:
      - lc-network
    entrypoint: |  # Adopted from https://stackoverflow.com/a/78580294
      /bin/sh -c '
        isAlive() { curl -sf http://127.0.0.1:9000/minio/health/live; }
        minio $$0 "$$@" --quiet & echo $$! > /tmp/minio.pid
        while ! isAlive; do sleep 0.1; done
        mc alias set minio http://127.0.0.1:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
        mc mb minio/$$MINIO_INIT_BUCKET || true
        mc anonymous set public minio/$$MINIO_INIT_BUCKET
        kill -s INT $$(cat /tmp/minio.pid) && rm /tmp/minio.pid
        while isAlive; do sleep 0.1; done
        exec minio $$0 "$$@"
      '
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  lc-network:
    name: lc-network
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mofrim/goewalddb/data/postgres-data
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mofrim/goewalddb/data/minio-data
