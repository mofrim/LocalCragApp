# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=badactors:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;

# Connection limiting (prevents too many simultaneous connections from one IP)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Track status codes for logging
map $status $loggable {
    ~^[23]  0;
    default 1;
}

server {
  listen 80;
  server_name goewalddb.de;

  limit_req zone=general burst=20 nodelay;
  limit_conn conn_limit 10;

  # Redirect HTTP to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }

  # Let's Encrypt validation
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;

    # Only allow specific file patterns (ACME tokens are alphanumeric)
    location ~ \.(php|sh|cgi|pl|py|exe|asp|aspx|jsp)$ {
        deny all;
        return 404;
    }

    # Disable PHP processing entirely in this directory
    location ~ \.php$ {
        deny all;
    }
  }
}

server {
  listen 443 ssl;
  server_name goewalddb.de;  # Replace with your domain

  # SSL configuration
  ssl_certificate /etc/letsencrypt/live/goewalddb.de/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/goewalddb.de/privkey.pem;

  # SSL parameters
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # HSTS configuration
  add_header Strict-Transport-Security "max-age=31536000" always;

  # prevent clickjacking of this site.
  add_header Content-Security-Policy "frame-ancestors 'none'";
  # add_header X-Frame-Options "DENY";
  add_header X-Frame-Options "SAMEORIGIN" always;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-always" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  add_header Cache-Control "public, no-transform";

  # Global rate limiting for HTTPS
  limit_req zone=general burst=30 nodelay;
  limit_conn conn_limit 15;

  # Block suspicious paths with strict rate limiting
  location ~ \.(php|asp|aspx|exe|sh|cgi|pl|py|jsp)$ {
    limit_req zone=badactors burst=1;
    return 404;
  }

  # Block access to hidden files/folders
  location ~ /\.(git|env|svn|htaccess|htpasswd) {
    limit_req zone=badactors burst=1;
    deny all;
    return 404;
  }


  # Frontend
  location / {
    # Higher rate limit for static content
    limit_req zone=static burst=100 nodelay;

    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    # Caching headers
    expires 30d;
  }
}
