server {
  listen 80;
  server_name goewalddb.de;

  # Redirect HTTP to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }

  # Let's Encrypt validation
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
}

server {
  listen 443 ssl;
  server_name goewalddb.de;  # Replace with your domain

  # SSL configuration
  ssl_certificate /etc/letsencrypt/live/goewalddb.de/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/goewalddb.de/privkey.pem;

  # SSL parameters
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # HSTS configuration
  add_header Strict-Transport-Security "max-age=31536000" always;

  # Frontend
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;

    # Caching headers
    add_header Cache-Control "public, no-transform";
    expires 30d;
  }

  # Backend API
  location /api {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # MinIO API
  #
  # In the proxy_pass http://minio:9000/ directive:
  #
  # The trailing slash here is significant and changes the behavior With the
  # trailing slash: nginx strips the matched location prefix (/minio/) before
  # passing the request. Without the trailing slash: nginx keeps the full
  # original URL path
  #
  # Example:
  #
  # Request to: /minio/bucket/file.txt
  # With trailing slash in proxy_pass: forwards to
  # http://minio:9000/bucket/file.txt
  # Without trailing slash in proxy_pass: forwards to
  # http://minio:9000/minio/bucket/file.txt
  location /minio/ {
    proxy_pass http://minio:9000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

